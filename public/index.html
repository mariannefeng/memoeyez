<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#78BC61" />
  <title>memoeyez</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/png" href="/icons/icon-192.png" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="topbar">
    <h1 class="brand">
      <img class="brand-logo" src="/logo.svg" alt="memoeyez" />
    </h1>
    <nav class="tabs">
      <button class="tab" data-view="study" aria-current="true">Study</button>
      <button class="tab" data-view="manage">Manage</button>
    </nav>
    <span id="sync-status" class="sync" title="Sync status"></span>
  </header>

  <main>
    <!-- STUDY VIEW -->
    <section id="view-study" class="view">
      <div class="study-modes" role="tablist">
        <button class="mode-btn" data-mode="all" aria-current="true">All</button>
        <button class="mode-btn" data-mode="due" aria-current="false">Due</button>
      </div>

      <div id="study-empty" class="empty" hidden>
        <p id="study-empty-text">Nothing due right now.</p>
      </div>

      <div id="study-card" class="card" hidden>
        <div class="card-face" id="card-front"></div>
        <div class="card-face card-back" id="card-back" hidden></div>

        <div class="card-actions">
          <button id="btn-reveal" class="btn btn-primary btn-wide">Show answer</button>
          <div id="grade-buttons" class="grades" hidden>
            <button class="btn grade" data-grade="again">Again</button>
            <button class="btn grade" data-grade="hard">Hard</button>
            <button class="btn grade" data-grade="good">Good</button>
            <button class="btn grade" data-grade="easy">Easy</button>
          </div>
          <button id="btn-next" class="btn btn-primary btn-wide" hidden>Next</button>
        </div>
      </div>
    </section>

    <!-- MANAGE VIEW -->
    <section id="view-manage" class="view" hidden>
      <form id="add-form" class="add-form">
        <input id="add-front" class="input" placeholder="Front (question)" autocomplete="off" required />
        <input id="add-back" class="input" placeholder="Back (answer)" autocomplete="off" required />
        <button class="btn btn-primary" type="submit">Add card</button>
      </form>

      <div id="manage-count" class="muted"></div>
      <ul id="card-list" class="card-list"></ul>
    </section>
  </main>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
